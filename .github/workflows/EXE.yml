name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pc_system_optimizer.py"
      - "requirements.txt"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: read

jobs:
  build-windows:
    name: Compile Windows executable
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install project dependencies
        run: |
          if (Test-Path requirements.txt) {
            python -m pip install -r requirements.txt
          }
          python -m pip install pyinstaller

      - name: Verify application file
        run: |
          if (-not (Test-Path "pc_system_optimizer.py")) {
            Write-Error "pc_system_optimizer.py was not found in the repository root."
            exit 1
          }

      - name: Build Windows EXE
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "PC-System-Optimizer-Auditor" `
            "pc_system_optimizer.py"

      - name: Show build output
        run: Get-ChildItem -Recurse dist

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: PC-System-Optimizer-Auditor-Windows
          path: dist/PC-System-Optimizer-Auditor.exe
          if-no-files-found: error
          retention-days: 30
